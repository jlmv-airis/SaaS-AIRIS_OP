<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS AIRIS - Operaciones</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-start: #0f0c29;
  --bg-mid: #1a1040;
  --bg-end: #24243e;
  --glass-bg: rgba(255,255,255,0.08);
  --glass-border: rgba(255,255,255,0.12);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.3);
  --accent: #6c5ce7;
  --accent-light: #a29bfe;
  --accent-glow: rgba(108,92,231,0.4);
  --text-primary: #ffffff;
  --text-secondary: rgba(255,255,255,0.6);
  --danger: #ff6b6b;
  --success: #51cf66;
  --radius: 16px;
  --radius-sm: 12px;
  --radius-xs: 8px;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, var(--bg-start), var(--bg-mid), var(--bg-end));
  min-height: 100vh;
  color: var(--text-primary);
  overflow-x: hidden;
}

.bg-shapes {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.shape {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.3;
  animation: float 20s infinite ease-in-out;
}

.shape:nth-child(1) {
  width: 400px; height: 400px;
  background: var(--accent);
  top: -100px; left: -100px;
  animation-delay: 0s;
}

.shape:nth-child(2) {
  width: 300px; height: 300px;
  background: #fd79a8;
  bottom: -80px; right: -80px;
  animation-delay: -5s;
}

.shape:nth-child(3) {
  width: 250px; height: 250px;
  background: #00cec9;
  top: 50%; left: 50%;
  animation-delay: -10s;
}

.shape:nth-child(4) {
  width: 200px; height: 200px;
  background: var(--accent-light);
  top: 20%; right: 15%;
  animation-delay: -15s;
}

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(50px, -50px) scale(1.1); }
  50% { transform: translate(-30px, 30px) scale(0.9); }
  75% { transform: translate(40px, 20px) scale(1.05); }
}

.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  box-shadow: var(--glass-shadow);
}

#login-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: opacity 0.5s ease, transform 0.5s ease;
}

#login-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(107,99,255,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(81,207,102,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(255,107,107,0.05) 0%, transparent 50%);
  pointer-events: none;
}

#login-screen.hidden {
  opacity: 0;
  transform: scale(0.95);
  pointer-events: none;
}

.login-card {
  width: 100%;
  max-width: 400px;
  padding: 48px 40px 40px;
  text-align: center;
  animation: slideUp 0.6s ease;
  position: relative;
  overflow: hidden;
}

.login-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), #51cf66, var(--accent));
  background-size: 200% 100%;
  animation: shimmerBar 3s ease infinite;
}

@keyframes shimmerBar {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.login-title {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 2px;
  background: linear-gradient(135deg, #fff, rgba(255,255,255,0.7));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.login-sub {
  color: var(--text-secondary);
  font-size: 13px;
  margin-bottom: 32px;
  letter-spacing: 0.3px;
}

.login-sub span {
  color: var(--accent);
  font-weight: 600;
}

.login-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
  font-size: 11px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
}

.login-divider::before,
.login-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--glass-border);
}

.login-input {
  width: 100%;
  padding: 16px 20px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  color: white;
  font-size: 15px;
  font-family: inherit;
  outline: none;
  transition: all 0.3s;
  text-align: left;
  font-weight: 500;
}

.login-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 20px var(--accent-glow);
  background: rgba(255,255,255,0.1);
}

.login-input::placeholder {
  font-weight: 400;
  color: rgba(255,255,255,0.3);
}

.login-btn {
  width: 100%;
  padding: 16px;
  margin-top: 16px;
  background: linear-gradient(135deg, var(--accent), #8b7cf7);
  border: none;
  border-radius: var(--radius-sm);
  color: white;
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.btn-wave {
  position: absolute;
  background: rgba(255, 255, 255, 0.4);
  transform: translate(-50%, -50%);
  pointer-events: none;
  border-radius: 50%;
  animation: wave-animation 0.8s linear;
}

@keyframes wave-animation {
  from {
    width: 0px;
    height: 0px;
    opacity: 0.5;
  }
  to {
    width: 500px;
    height: 500px;
    opacity: 0;
  }
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px var(--accent-glow);
}

.login-btn:active {
  transform: translateY(0);
}

.login-btn.loading {
  pointer-events: none;
  opacity: 0.8;
}

.login-btn.loading::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.login-error {
  color: var(--danger);
  font-size: 13px;
  font-weight: 500;
  margin-top: 12px;
  min-height: 20px;
  animation: shake 0.4s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

#dashboard {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: none;
  animation: fadeIn 0.5s ease;
}

#dashboard.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.header {
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--glass-border);
  position: sticky;
  top: 0;
  z-index: 20;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-logo {
  width: 44px;
  height: 44px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--accent), #8b7cf7);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.header-title {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.3px;
}

.header-badge {
  font-size: 11px;
  font-weight: 700;
  background: var(--accent);
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.btn-glass {
  padding: 10px 20px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-xs);
  color: var(--text-primary);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-glass:hover {
  background: rgba(255,255,255,0.12);
  transform: translateY(-1px);
}

.main-content {
  padding: 32px;
  max-width: 1200px;
  margin: 0 auto;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 32px;
}

.stat-card {
  padding: 24px;
  animation: slideUp 0.6s ease;
}

.stat-card:nth-child(1) { animation-delay: 0.1s; }
.stat-card:nth-child(2) { animation-delay: 0.2s; }

.stat-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  margin-bottom: 16px;
}

.stat-icon.ops { background: rgba(108,92,231,0.2); color: var(--accent-light); }
.stat-icon.active { background: rgba(81,207,102,0.2); color: var(--success); }

.stat-number {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1;
  margin-bottom: 4px;
}

.stat-label {
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
}

.welcome-card {
  padding: 40px;
  text-align: center;
  animation: slideUp 0.6s ease;
  animation-delay: 0.3s;
}

.welcome-icon {
  font-size: 64px;
  margin-bottom: 20px;
  color: var(--accent-light);
}

.welcome-text {
  font-size: 18px;
  color: var(--text-secondary);
  line-height: 1.6;
  max-width: 500px;
  margin: 0 auto;
}

.welcome-text strong {
  color: var(--text-primary);
}

.toast-container {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 14px 20px;
  border-radius: var(--radius-xs);
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: toastIn 0.3s ease;
  min-width: 280px;
}

.toast.success {
  background: rgba(15,45,20,0.92);
  border: 1px solid var(--success);
  color: #51cf66;
}

.toast.error {
  background: rgba(45,15,15,0.92);
  border: 1px solid var(--danger);
  color: #ff6b6b;
}

@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

.toast.out {
  animation: toastOut 0.3s ease forwards;
}

@keyframes toastOut {
  from { opacity: 1; transform: translateX(0); }
  to { opacity: 0; transform: translateX(20px); }
}

@media (max-width: 768px) {
  .header { padding: 16px 20px; }
  .main-content { padding: 20px; }
  .stats-grid { grid-template-columns: 1fr; }
  .login-card { padding: 32px 24px; margin: 16px; }
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
</style>
</head>
<body>

<div class="bg-shapes">
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<div id="login-screen">
  <div class="glass login-card">
    <div class="login-icon" style="overflow:hidden;background:transparent;box-shadow:none;padding:0;width:100%;height:auto;max-height:100px;margin-bottom:30px;border-radius:0;display:flex;align-items:center;justify-content:center;">
      <? if (logoBase64) { ?>
        <div style="position:relative; width:100%; height:100px; display:flex; align-items:center; justify-content:center;">
          <img src="<?!= logoBase64 ?>" style="width:auto;height:auto;max-width:100%;max-height:100px;display:block;filter: brightness(1.1); position:absolute;">
          <img src="<?!= logoBase64 ?>" style="width:auto;height:auto;max-width:100%;max-height:100px;display:block;filter: brightness(0) invert(1); position:absolute; clip-path: inset(0 0 0 35%);">
        </div>
      <? } else { ?>
        <div style="width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg, var(--accent), #6c5ce7);display:flex;align-items:center;justify-content:center;margin:0 auto;position:relative;box-shadow: 0 0 50px var(--accent-glow);">
          <i class="fas fa-scale-balanced"></i>
        </div>
      <? } ?>
    </div>
    <h1 class="login-title">SaaS AIRIS</h1>
    <p class="login-sub"><span>Legalidad</span> y <span>Materialidad</span></p>
    <div class="login-divider">Acceso al sistema</div>
    <input type="text" id="loginUser" class="login-input" placeholder="Nombre de usuario" autocomplete="off" onkeydown="if(event.key==='Enter') document.getElementById('loginPassword').focus()" style="margin-bottom:12px;">
    <input type="password" id="loginPassword" class="login-input" placeholder="Contraseña" autocomplete="off" onkeydown="if(event.key==='Enter') handleLogin()">
    <button id="loginBtn" class="login-btn" onclick="handleLogin(event)">
      <i class="fas fa-arrow-right-to-bracket"></i> Ingresar
    </button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<div id="dashboard">
  <header class="header">
    <div class="header-left">
      <div class="header-logo" style="overflow:hidden;background:transparent;padding:0;width:38px;height:38px;border-radius:10px;">
        <? if (logoBase64) { ?>
          <img src="<?!= logoBase64 ?>" style="width:100%;height:100%;object-fit:cover;">
        <? } else { ?>
          <i class="fas fa-scale-balanced"></i>
        <? } ?>
      </div>
      <div>
        <span class="header-title">SaaS AIRIS</span>
        <span class="header-badge" id="roleBadge">Admin</span>
      </div>
    </div>
    <div class="header-right">
      <button class="btn-glass" onclick="handleLogout()">
        <i class="fas fa-right-from-bracket"></i> Salir
      </button>
    </div>
  </header>

  <main class="main-content">
    <div class="stats-grid">
      <div class="glass stat-card">
        <div class="stat-icon ops"><i class="fas fa-shield"></i></div>
        <div class="stat-number" id="statVersion">1.0</div>
        <div class="stat-label">Versión del Sistema</div>
      </div>
      <div class="glass stat-card">
        <div class="stat-icon active"><i class="fas fa-user-check"></i></div>
        <div class="stat-number" id="statUser">Admin</div>
        <div class="stat-label">Sesión Activa</div>
      </div>
    </div>

    <div class="glass welcome-card">
      <div class="welcome-icon">
        <i class="fas fa-hand-wave"></i>
      </div>
      <div class="welcome-text">
        Bienvenido <strong>Administrador</strong> al sistema <strong>SaaS AIRIS</strong>.<br><br>
        Panel de control para la gestión de <strong>Legalidad</strong> y <strong>Materialidad</strong>.<br><br>
        <span style="font-size:14px;color:var(--text-secondary);">Próximamente: Módulo de Operadores, Proyectos, Checklists y más.</span>
      </div>
    </div>
  </main>
</div>

<script>
var sessionToken = null;
var currentUser = null;

window.addEventListener('load', function() {
  document.getElementById('loginUser').focus();
});

function showToast(message, type) {
  var container = document.getElementById('toastContainer');
  var icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-xmark';
  var toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = '<i class="fas ' + icon + '"></i> ' + message;
  container.appendChild(toast);
  setTimeout(function() {
    toast.classList.add('out');
    setTimeout(function() { toast.remove(); }, 300);
  }, 3000);
}

function handleLogin(event) {
  var btn = document.getElementById('loginBtn');

  if (event && (event.type === 'click' || event.type === 'mousedown')) {
    var rect = btn.getBoundingClientRect();
    var x = event.clientX - rect.left;
    var y = event.clientY - rect.top;

    var wave = document.createElement('span');
    wave.className = 'btn-wave';
    wave.style.left = x + 'px';
    wave.style.top = y + 'px';
    btn.appendChild(wave);
    setTimeout(function() { wave.remove(); }, 800);
  } else if (!event) {
    var wave = document.createElement('span');
    wave.className = 'btn-wave';
    wave.style.left = '50%';
    wave.style.top = '50%';
    btn.appendChild(wave);
    setTimeout(function() { wave.remove(); }, 800);
  }

  var username = document.getElementById('loginUser').value.trim().toLowerCase();
  var password = document.getElementById('loginPassword').value;
  var error = document.getElementById('loginError');

  if (!username || !password) { error.textContent = 'Ingresa usuario y contraseña'; return; }

  btn.classList.add('loading');
  error.textContent = '';

  google.script.run
    .withSuccessHandler(function(result) {
      btn.classList.remove('loading');
      if (result.success) {
        sessionToken = result.token;
        currentUser = result;
        error.textContent = '';
        showToast('Bienvenido al panel de administración', 'success');
        showDashboard();
      } else {
        error.textContent = result.error || 'Error de autenticación';
      }
    })
    .withFailureHandler(function(err) {
      btn.classList.remove('loading');
      error.textContent = 'Error de conexión: ' + err.message;
    })
    .login(username, password);
}

function showDashboard() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('dashboard').classList.add('active');
  document.getElementById('roleBadge').textContent = 'Admin';
  document.getElementById('statUser').textContent = 'Admin';
}

function handleLogout() {
  google.script.run
    .withSuccessHandler(function() {
      sessionToken = null;
      currentUser = null;
      document.getElementById('dashboard').classList.remove('active');
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('loginUser').value = '';
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginError').textContent = '';
      showToast('Sesión cerrada', 'success');
    })
    .logout(sessionToken);
}
</script>
</body>
</html>
